# Render Blueprint — optional: New > Blueprint in Render dashboard
services:
  - type: web
    name: pakkiora-api
    runtime: python
    rootDir: backend
    buildCommand: ./build.sh
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: CORS_ALLOWED_ORIGINS
        sync: false
